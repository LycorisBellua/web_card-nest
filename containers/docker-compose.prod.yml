services:
  app:
    build:
      target: prod
    environment:
      NODE_ENV: production
      HOME_URL: ${PROD_URL}
    networks:
      - app-net

  nginx:
    build:
      context: ..
      dockerfile: containers/nginx/Dockerfile
    container_name: nginx
    environment:
      DB_USER: ${DB_ACCESS_USER}
      DB_PASS: ${DB_ACCESS_PASSWORD}
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - app
    networks:
      - app-net
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

networks:
  app-net:
    driver: bridge
