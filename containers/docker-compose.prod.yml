services:
  app:
    build:
      target: prod

  nginx:
    image: nginx:1.29.5-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - '443:443'
      - '80:80'
    depends_on:
      - app
    networks:
      - app-net
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
