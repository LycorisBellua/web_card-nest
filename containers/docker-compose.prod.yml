services:
  app:
    build:
      target: prod
    networks:
      - app-net

  nginx:
    image: nginx:1.29.5-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - app
    networks:
      - app-net
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

networks:
  app-net:
    driver: bridge
