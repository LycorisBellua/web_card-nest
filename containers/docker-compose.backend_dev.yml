services:
  app:
    build:
      target: backend_dev
    ports:
      - "3000:3000"
      - "5555:5555"
    environment:
      NODE_ENV: development
    volumes:
      - ../backend:/app/backend
      - ../frontend:/app/frontend
      - backend_node_modules:/app/backend/node_modules
      - frontend_node_modules:/app/frontend/node_modules

volumes:
  frontend_node_modules:
  backend_node_modules:
